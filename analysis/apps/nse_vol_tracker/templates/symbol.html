{% extends "base.html" %}

{% block title %}{{ symbol }} – NSE Portal{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', path='css/table.css') }}">
{% endblock %}

{% block header_config %}
<div class="nav-config-bar">
  <strong class="sym-title-bold">{{ symbol }}</strong>

  <select id="symTf" class="nav-select">
    <option value="3" {% if timeframe=='3' %}selected{% endif %}>3m</option>
    <option value="15" {% if timeframe=='15' %}selected{% endif %}>15m</option>
    <option value="D" {% if timeframe=='D' %}selected{% endif %}>1D</option>
  </select>

  <div class="nav-divider"></div>

  <select id="indSource" class="nav-select">
    <option value="volume">Volume</option>
    <option value="price">Price</option>
  </select>
  <select id="indType" class="nav-select">
    <option value="raw">Source</option>
    <option value="rma">RMA</option>
    <option value="ema">EMA</option>
    <option value="sma">SMA</option>
  </select>
  <input type="number" id="indPeriod" class="nav-input" value="8" min="1" max="500">
  <button id="addIndBtn" class="nav-select btn-add-ind">+ ADD</button>
</div>
{% endblock %}

{% block content %}
<div class="sym-indicators-bar" id="indicatorChips">
</div>

<div class="chart-outer-clean">
  <div class="chart-panel-clean">
    <div class="chart-canvas-wrap-clean">
      <canvas id="mainChart"></canvas>
    </div>
  </div>
</div>

<script id="chartConfig" type="application/json">
    { "symbol": "{{ symbol }}", "timeframe": "{{ timeframe }}" }
  </script>
<script id="rawData" type="application/json">{{ data | tojson }}</script>
<script type="module" src="{{ url_for('static', path='js/chart_module.js') }}"></script>
{% endblock %}
