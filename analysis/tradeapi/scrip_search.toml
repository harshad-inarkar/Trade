# scrip_search.toml — Configuration for the Scrip Master Search Engine

[search.stop_words]
words = ["OF", "THE", "&", "LTD", "LIMITED", "CORP", "CORPORATION", "CO"]

[search.aliases.call]
words = ["CALL", "CE", "C", "CA"]

[search.aliases.put]
words = ["PUT", "PE", "P", "PA"]

[search.aliases.fut]
words = ["FUT", "FUTURE", "FUTURES"]

[search.month_aliases]
# Maps human inputs directly to the standardized 3-letter broker notation
"JAN" = "JAN"
"JANUARY" = "JAN"
"01" = "JAN"
"FEB" = "FEB"
"FEBRUARY" = "FEB"
"02" = "FEB"
"MAR" = "MAR"
"MARCH" = "MAR"
"03" = "MAR"
"APR" = "APR"
"APRIL" = "APR"
"04" = "APR"
"MAY" = "MAY"
"05" = "MAY"
"JUN" = "JUN"
"JUNE" = "JUN"
"06" = "JUN"
"JUL" = "JUL"
"JULY" = "JUL"
"07" = "JUL"
"AUG" = "AUG"
"AUGUST" = "AUG"
"08" = "AUG"
"SEP" = "SEP"
"SEPTEMBER" = "SEP"
"09" = "SEP"
"OCT" = "OCT"
"OCTOBER" = "OCT"
"10" = "OCT"
"NOV" = "NOV"
"NOVEMBER" = "NOV"
"11" = "NOV"
"DEC" = "DEC"
"DECEMBER" = "DEC"
"12" = "DEC"

# ── Scoring weights (tune without touching Python) ───────────────────────────
# Scores are summed per query token then sorted descending.
# Rule of thumb: exact_symbol >> symbol_prefix >> company_idf >> expiry_bonus.
[search.scoring]
# Flat bonus (added once, not per-token) when the underlying ticker equals
# a query name-token exactly.  Dominates all other signals.
exact_symbol_bonus   = 1000.0

# Flat bonus when the ticker starts-with the token (or vice-versa).
symbol_prefix_bonus  = 400.0

# Per-token: IDF(token) × this factor for company-name matches.
# Higher → rare company words (e.g. "STATE") matter more than common ones ("BANK").
company_idf_factor   = 100.0

# Added once when ALL name-tokens matched via AND (not OR fallback).
# Rewards precise multi-word queries over partial guesses.
all_tokens_coherence = 200.0

# Per-expiry-day proximity nudge.  Set to 0.0 (default) to disable: the final
# sort key already places nearer-expiry contracts first within equal-score
# groups.  Increase only if you want proximity to override the IDF signal.
expiry_proximity_scale = 0.0

# Flat bonus for EQ/INDEX rows (no expiry) in generic queries with no
# structured filter (month / strike / opt_type). Floats equities to the top.
eq_base_bonus = 50.0

[search.month_generation_tags]
# Used internally to build the hidden Bag-of-Words index for each integer month
1 = "JAN JANUARY 01"
2 = "FEB FEBRUARY 02"
3 = "MAR MARCH 03"
4 = "APR APRIL 04"
5 = "MAY 05"
6 = "JUN JUNE 06"
7 = "JUL JULY 07"
8 = "AUG AUGUST 08"
9 = "SEP SEPTEMBER 09"
10 = "OCT OCTOBER 10"
11 = "NOV NOVEMBER 11"
12 = "DEC DECEMBER 12"