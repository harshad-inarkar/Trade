<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ symbol }} Volume</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>

<style>
body {
    margin: 0;
    padding: 24px;
    font-family: Segoe UI, Arial, sans-serif;
    background: #f4f6fb;
}

.container {
    max-width: 1400px;
    margin: auto;
    background: #ffffff;
    padding: 20px;
    border-radius: 8px;
}

/* Tabs */
.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
}

.tab {
    padding: 8px 16px;
    background: #e5e7eb;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    color: #1f2937;
}

.tab.active {
    background: #2563eb;
    color: #ffffff;
}

/* Chart */
.scroll-container {
    overflow-x: auto;
    margin-bottom: 20px;
}

canvas {
    display: block;
}

/* Table */
.table-container {
    max-height: 400px;
    overflow-y: auto;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

thead th {
    position: sticky;
    top: 0;
    background: #f3f4f6;
    z-index: 1;
}

th, td {
    padding: 8px 10px;
    border-bottom: 1px solid #e5e7eb;
    text-align: right;
}

th:first-child,
td:first-child {
    text-align: left;
}

tbody tr:hover {
    background: #f9fafb;
}
</style>
</head>

<body>

<div class="container">

<h2>{{ symbol }} — Volume Moving Averages</h2>

<!-- Tabs -->
<div class="tabs">
    <a class="tab {% if timeframe == '3' %}active{% endif %}" href="?tf=3">3</a>
    <a class="tab {% if timeframe == '15' %}active{% endif %}" href="?tf=15">15</a>
    <a class="tab {% if timeframe == 'D' %}active{% endif %}" href="?tf=D">D</a>
</div>

<!-- Chart -->
<div class="scroll-container">
    <canvas id="chart" height="500"></canvas>
</div>

<!-- Table (LAST 20 ROWS ONLY) -->
<div class="table-container">
<table>
    <thead>
        <tr>
            <th>Timestamp</th>
            <th>Volume Slow</th>
            <th>Volume Fast</th>
            <th>LTP</th>
        </tr>
    </thead>
    <tbody>
    {% for row in data[-20:] %}
        <tr>
            <td>{{ row.timestamp }}</td>
            <td>{{ row.volume_slow | round | int }}</td>
            <td>{{ row.volume_fast | round | int }}</td>
            <td>{{ row.ltp | round(2) }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
</div>

</div>

<script>
/* ===== DATA FROM FLASK ===== */
const data = {{ data | tojson }};
const labels = data.map(d => d.timestamp);
const slow   = data.map(d => Number(d.volume_slow));
const fast   = data.map(d => Number(d.volume_fast));

const PX_PER_POINT = 4;
const minWidth = 1200;

const canvas = document.getElementById('chart');
canvas.width = Math.max(labels.length * PX_PER_POINT, minWidth);

const ctx = canvas.getContext('2d');

const scroller = document.querySelector('.scroll-container');
const VIEWPORT_WIDTH = scroller.clientWidth;


new Chart(ctx, {
    type: 'line',
    data: {
        labels,
        datasets: [
            {
                label: 'Volume Slow',
                data: slow,
                borderColor: 'red',
                pointRadius: 0,
                tension: 0.3
            },
            {
                label: 'Volume Fast',
                data: fast,
                borderColor: 'blue',
                pointRadius: 0,
                tension: 0.3
            }
        ]
    },
    options: {
        responsive: false,
        scales: {
            x: {
                title: { display: true, text: 'Time' },
                ticks: {
                autoSkip: false,
                maxRotation: 0,
                callback: function(_, index) {

                    const LABELS_PER_WINDOW = 25;

                    // pixels per data point on canvas
                    const pxPerPoint = ctx.canvas.width / labels.length;

                    // how many points fit in the visible window
                    const pointsPerWindow = VIEWPORT_WIDTH / pxPerPoint;

                    // step to get ~25 labels per window
                    const step = Math.max(1, Math.round(pointsPerWindow / LABELS_PER_WINDOW));

                    return index % step === 0 ? labels[index] : '';
                    }
                }
            },
         y: {
                title: { display: true, text: 'Volume' }
            }
        }
    }
});

document.querySelector('.scroll-container').scrollLeft =
    document.querySelector('.scroll-container').scrollWidth;

</script>

</body>
</html>
