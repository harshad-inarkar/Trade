{% extends "base.html" %}
{% block title %}{{ symbol }} - NSE Portal{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
<link rel="stylesheet" href="{{ url_for('static', path='css/table.css') }}">
{% endblock %}

{% block content %}
<div class="chart-container">
  <canvas id="mainChart"></canvas>
</div>

<script id="rawData" type="application/json">{{ data | tojson }}</script>
<script type="module">
  import { VolumeChartManager } from "{{ url_for('static', path='js/chart_module.js') }}";
  
  document.addEventListener('DOMContentLoaded', () => {
      const rawData = JSON.parse(document.getElementById('rawData').textContent);
      const rows = rawData.slice(1);
      
      new VolumeChartManager('mainChart', {
          labels: rows.map(r => r[0]), // 0 is timestamp_full
          slow: rows.map(r => r[2]),   // 2 is volume_slow
          fast: rows.map(r => r[3])    // 3 is volume_fast
      });
  });
</script>
{% endblock %}
